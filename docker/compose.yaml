services:
  llmops-api:
    image: llmops-api
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: llmops-api

    depends_on:
      - postgres
      - redis


  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llmops
    volumes:
      #认的数据存储路径是 /var/lib/postgresql/data
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready"]
      interval: 1s
      timeout: 3s
      retries: 30
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:6-alpine
    container_name: redis
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
    ports:
      - "6379:6379"

  celery:
