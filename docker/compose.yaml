services:

  llmops-api:
    image: llmops-api:0.1.0
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: llmops-api
    ports:
      - "8888:8888"
    restart: always
    environment:
      <<: *common-env
      MODE: api
      MIGRATION_ENABLED: 'true'
      SERVER_WORKER_AMOUNT: 4
      SERVER_THREAD_AMOUNT: 4
    volumes:
      - ./volumes/app/storage:/app/api/storage
    depends_on:
      - llmops-redis
      - llmops-postgres
      - llmops-qdrant

  llmops-celery:
    image: llmops-api:0.1.0
    container_name: llmops-celery
    restart: always
    environment:
      <<: *common-env
      MODE: celery
      MIGRATION_ENABLED: 'false'
      CELERY_APP_PATH: app.component.worker.celery_client.celery
      #celery 默认使用多进程 prefork，如果想使用协程 gevent
      CELERY_WORKER_CLASS: prefork
      CELERY_WORKER_AMOUNT: 4
    volumes:
      - ./volumes/app/storage:/app/api/storage
    depends_on:
      - llmops-redis
      - llmops-postgres
      - llmops-qdrant

  llmops-redis:
    image: redis:6-alpine
    container_name: llmops-redis
    restart: always
    volumes:
      - ./volumes/redis/data:/var/lib/redis/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
    ports:
      - "6379:6379"

  llmops-postgres:
    image: postgres:16-alpine
    container_name: llmops-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llmops
    volumes:
      #认的数据存储路径是 /var/lib/postgresql/data
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready"]
      interval: 1s
      timeout: 3s
      retries: 30
    ports:
      - "5432:5432"

  llmops-qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: llmops-qdrant
    restart: always
    environment:
      QDRANT__SERVICE__API_KEY: a8f9b2c4d6e7f1a3b5c9d2e4f6a7b8c1
    volumes:
      - ./volumes/qdrant_storage:/var/lib/qdrant/data
    # 暴露 REST API 和 gRPC 端口
    ports:
      - "6333:6333"   # REST API + Web Dashboard
      - "6334:6334"   # gRPC 端口（Python 客户端高性能连接）